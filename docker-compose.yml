services:
  signaction:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Optional: override where assets live inside the container.
      # - SIGNACTION_ASSETS_DIR=/data/signaction_assets
      # Optional: set your Vosk model path in the container.
      # - VOSK_MODEL_PATH=/data/vosk-model
      - SIGNACTION_CORS_ORIGINS=*
    volumes:
      # Optional: persist assets/models locally (uncomment + adjust as needed)
      # - ./signaction_assets:/data/signaction_assets
      # - ./models:/data/models
      - ./signaction_assets:/app/signaction_assets
